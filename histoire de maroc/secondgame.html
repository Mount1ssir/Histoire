<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <title>لعبة ذاكرة التراث المغربي</title>
    <style>
      :root {
        --bg-color: #f4ebd0;
        --card-back: #00416a;
        --card-front: #e2725b;
        --success: #4caf50;
      }

      body {
        background-color: var(--bg-color);
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        margin: 0;
        padding: 20px;
      }

      .header {
        text-align: center;
        color: var(--card-back);
      }

      #game-info {
        margin-bottom: 20px;
        font-size: 1.2rem;
        font-weight: bold;
      }

      /* حاوية البطاقات */
      #game-grid {
        display: grid;
        gap: 10px;
        perspective: 1000px;
        max-width: 90vw;
      }

      .card {
        width: 100px;
        height: 100px;
        position: relative;
        transform-style: preserve-3d;
        transition: transform 0.5s;
        cursor: pointer;
      }

      .card.flipped {
        transform: rotateY(180deg);
      }

      .card-face {
        position: absolute;
        width: 100%;
        height: 100%;
        backface-visibility: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2rem;
        border-radius: 8px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      }

      .card-back {
        background-color: var(--card-back);
        color: white;
      }

      .card-front {
        background-color: var(--card-front);
        transform: rotateY(180deg);
        color: white;
      }

      .card.matched .card-front {
        background-color: var(--success);
      }

      .btn {
        margin-top: 20px;
        padding: 10px 25px;
        background: var(--card-back);
        color: white;
        border: none;
        border-radius: 20px;
        cursor: pointer;
        font-size: 1rem;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>ذاكرة الصناعة التقليدية</h1>
      <div id="game-info">المستوى: <span id="level-display">1</span></div>
    </div>

    <div id="game-grid"></div>

    <button class="btn" onclick="resetGame()">ابدأ من جديد</button>

    <script>
      const icons = [
        "🏺",
        "🎨",
        "🧶",
        "🫖",
        "🕯️",
        "👞",
        "🧺",
        "🕌",
        "🥘",
        "🍪",
        "📜",
        "⚔️",
      ];
      let currentLevel = 1;
      let flippedCards = [];
      let matchedPairs = 0;
      let canFlip = true;

      const grid = document.getElementById("game-grid");
      const levelDisplay = document.getElementById("level-display");

      function initGame() {
        grid.innerHTML = "";
        flippedCards = [];
        matchedPairs = 0;
        canFlip = true;

        // حساب عدد البطاقات: المستوى 1 (4)، المستوى 2 (8)، المستوى 3 (16)...
        const numberOfPairs = Math.pow(2, currentLevel);
        const gameIcons = icons.slice(0, numberOfPairs);
        const deck = [...gameIcons, ...gameIcons].sort(
          () => Math.random() - 0.5,
        );

        // تعديل شكل الشبكة برمجياً
        const columns = currentLevel === 1 ? 2 : 4;
        grid.style.gridTemplateColumns = `repeat(${columns}, 1fr)`;

        deck.forEach((icon, index) => {
          const card = document.createElement("div");
          card.classList.add("card");
          card.dataset.icon = icon;
          card.innerHTML = `
                    <div class="card-face card-back">؟</div>
                    <div class="card-face card-front">${icon}</div>
                `;
          card.addEventListener("click", flipCard);
          grid.appendChild(card);
        });
        levelDisplay.innerText = currentLevel;
      }

      function flipCard() {
        if (
          !canFlip ||
          this.classList.contains("flipped") ||
          this.classList.contains("matched")
        )
          return;

        this.classList.add("flipped");
        flippedCards.push(this);

        if (flippedCards.length === 2) {
          checkMatch();
        }
      }

      function checkMatch() {
        canFlip = false;
        const [card1, card2] = flippedCards;

        if (card1.dataset.icon === card2.dataset.icon) {
          card1.classList.add("matched");
          card2.classList.add("matched");
          matchedPairs++;
          flippedCards = [];
          canFlip = true;

          // التحقق من نهاية المستوى
          if (matchedPairs === Math.pow(2, currentLevel)) {
            setTimeout(nextLevel, 1000);
          }
        } else {
          setTimeout(() => {
            card1.classList.remove("flipped");
            card2.classList.remove("flipped");
            flippedCards = [];
            canFlip = true;
          }, 1000);
        }
      }

      function nextLevel() {
        alert(`مبروك! أكملت المستوى ${currentLevel}. استعد للمستوى القادم!`);
        currentLevel++;
        if (currentLevel > 3) {
          // يمكنك زيادة المستويات هنا
          alert("تهانينا! لقد أصبحت خبيراً في التراث المغربي!");
          currentLevel = 1;
        }
        initGame();
      }

      function resetGame() {
        currentLevel = 1;
        initGame();
      }

      initGame();
    </script>
  </body>
</html>
